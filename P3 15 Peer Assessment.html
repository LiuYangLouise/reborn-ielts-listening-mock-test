&lt;style&gt;
    /* ========== 全局与首页样式 ========== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Roboto', 'Noto Sans SC', sans-serif;
        background-color: #1A1A1A;
        color: #FFFFFF;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
        transition: all 0.3s ease;
    }
    body.light-mode { background-color: #FFFFFF; color: #1A1A1A; }
    .container {
        width: 100%;
        max-width: 800px;
        min-height: 600px;
        background-color: #1A1A1A;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        padding: 40px;
        border-radius: 12px;
        transition: all 0.3s ease;
        position: relative;
    }
    body.light-mode .container { background-color: #FFFFFF; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1); }
    .logo-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 60px; }
    .logo-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; }
    .hexagon-icon { position: relative; width: 60px; height: 70px; margin-bottom: 15px; }
    .hexagon {
        position: absolute;
        width: 60px;
        height: 70px;
        background-color: transparent;
        border: 2px solid #FFFFFF;
        border-radius: 2px;
        animation: hexagonGroupAppear 3.5s ease-in-out infinite;
        opacity: 0;
    }
    body.light-mode .hexagon { border-color: #1A1A1A; }
    .hexagon:nth-child(1) { top: 0; left: 0; }
    .hexagon:nth-child(2) { top: 10px; left: 35px; transform: scale(0.85); opacity: 0.8; }
    .hexagon:nth-child(3) { top: 10px; left: -35px; transform: scale(0.85); opacity: 0.8; }
    .hexagon:nth-child(4) { top: 40px; left: 18px; transform: scale(0.7); opacity: 0.6; }
    .hexagon:nth-child(5) { top: 40px; left: -18px; transform: scale(0.7); opacity: 0.6; }
    @keyframes hexagonGroupAppear {
        0% { opacity: 0; transform: scale(0.8) rotate(10deg); }
        20% { opacity: 1; transform: scale(1) rotate(0); }
        80% { opacity: 1; transform: scale(1) rotate(0); }
        100% { opacity: 0; transform: scale(0.8) rotate(-10deg); }
    }
    .logo-main { font-size: 2.5rem; font-weight: 700; letter-spacing: 1px; line-height: 1.2; color: #FFFFFF; }
    body.light-mode .logo-main { color: #1A1A1A; }
    .logo-sub { font-size: 1.5rem; font-weight: 500; margin-top: 8px; line-height: 1.2; color: #FFFFFF; }
    body.light-mode .logo-sub { color: #1A1A1A; }
    .subtitle { font-size: 1.1rem; font-weight: 300; color: #CCCCCC; letter-spacing: 3px; text-transform: uppercase; margin-top: 10px; }
    body.light-mode .subtitle { color: #666666; }
    .main-content { width: 100%; max-width: 400px; text-align: center; margin: 20px 0; }
    .password-card {
        background: #262626;
        border-radius: 16px;
        padding: 30px 25px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        border: 1px solid #3a3a3a;
    }
    body.light-mode .password-card { background: #F5F5F5; box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08); border: 1px solid #ddd; }
    .password-label { font-size: 1.2rem; font-weight: 500; margin-bottom: 20px; color: #CCCCCC; }
    body.light-mode .password-label { color: #333; }
    .password-input {
        width: 100%;
        padding: 14px 18px;
        font-size: 1rem;
        background-color: #1A1A1A;
        border: 1px solid #3a3a3a;
        border-radius: 12px;
        color: #FFFFFF;
        text-align: center;
        outline: none;
    }
    body.light-mode .password-input { background-color: #FFFFFF; border: 1px solid #ccc; color: #1A1A1A; }
    .error-message { margin-top: 15px; font-size: 0.85rem; color: #ff6b6b; min-height: 40px; }
    .confirm-btn {
        margin-top: 25px;
        background-color: #2c2c2c;
        border: none;
        border-radius: 40px;
        padding: 12px 28px;
        color: #FFFFFF;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        width: 100%;
        box-shadow: 0 5px 0 #121212;
        transform: translateY(-2px);
    }
    body.light-mode .confirm-btn { background-color: #e0e0e0; color: #1A1A1A; box-shadow: 0 5px 0 #b0b0b0; }
    .confirm-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #121212; }
    .footer { width: 100%; padding-top: 30px; border-top: 1px solid #262626; font-size: 0.9rem; color: #999999; text-align: center; }
    body.light-mode .footer { border-top-color: #E0E0E0; color: #666666; }
    .copyright { font-weight: 300; font-size: 1rem; margin-bottom: 30px; }
    .date-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 8px; }
    .date-item { display: flex; flex-direction: column; align-items: center; min-width: 50px; }
    .date-value { font-size: 1.8rem; font-weight: 600; color: #FFFFFF; line-height: 1; }
    body.light-mode .date-value { color: #1A1A1A; }
    .date-label { font-size: 0.8rem; color: #999999; margin-top: 4px; }
    .weekday { font-size: 1rem; color: #CCCCCC; margin-bottom: 5px; }
    .for-every-reborner { font-size: 0.7rem; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: #CCCCCC; margin-top: 5px; }
    .theme-slider-container { position: absolute; top: 20px; right: 20px; }
    .theme-slider { width: 60px; height: 30px; background-color: #262626; border-radius: 15px; position: relative; cursor: pointer; }
    body.light-mode .theme-slider { background-color: #E0E0E0; }
    .slider-dot { position: absolute; top: 3px; left: 3px; width: 24px; height: 24px; background-color: #FFFFFF; border-radius: 50%; transition: all 0.3s ease; }
    body.light-mode .slider-dot { background-color: #1A1A1A; left: 33px; }
    .hidden-page { display: none; }
    #p2ExamContainer { width: 100%; max-width: 1400px; margin: 0 auto; background: transparent; display: none; }
    
    /* ========== P3 Peer Assessment 完整样式 ========== */
    :root {
        --bg-soft: #f0f7f5;
        --panel-white: #ffffff;
        --primary-green: #0F6B6B;
        --primary-light: #e0f0f0;
        --border-light: #d4e2e2;
        --text-dark: #1f3a3a;
        --text-soft: #2a5f5f;
        --shadow-sm: 0 8px 20px rgba(0,0,0,0.05);
        --answered-bg: #e0f2f0;
        --answered-border: #0F6B6B;
        --correct-bg: #dcfce7;
        --correct-border: #4ade80;
        --incorrect-bg: #fee2e2;
        --incorrect-border: #f87171;
    }
    
    body:not(.light-mode) {
        --bg-soft: #2a2a2a;
        --panel-white: #1e1e1e;
        --primary-green: #4a9e9e;
        --primary-light: #2a4a4a;
        --border-light: #444444;
        --text-dark: #e0e0e0;
        --text-soft: #cccccc;
        --answered-bg: #2a4a4a;
        --answered-border: #4a9e9e;
        --correct-bg: #1a3a2a;
        --correct-border: #4ade80;
        --incorrect-bg: #3a1a1a;
        --incorrect-border: #f87171;
    }
    
    body:not(.light-mode) .master-container,
    body:not(.light-mode) .reborn-header,
    body:not(.light-mode) .audio-section,
    body:not(.light-mode) .instruction-box,
    body:not(.light-mode) .questions-panel,
    body:not(.light-mode) .group,
    body:not(.light-mode) .match-slot,
    body:not(.light-mode) .drag-pool,
    body:not(.light-mode) .drag-option,
    body:not(.light-mode) .bottom-bar,
    body:not(.light-mode) .results-table td,
    body:not(.light-mode) .note-card,
    body:not(.light-mode) #notes {
        color: #e0e0e0;
    }
    
    body:not(.light-mode) .radio-option label,
    body:not(.light-mode) .match-q b,
    body:not(.light-mode) p,
    body:not(.light-mode) .instructions {
        color: #e0e0e0;
    }
    
    .master-container { max-width: 1200px; margin: 0 auto; }
    .reborn-header {
        background: var(--panel-white);
        border-radius: 32px;
        padding: 18px 28px;
        margin-bottom: 24px;
        box-shadow: var(--shadow-sm);
        border: 1px solid var(--border-light);
        text-align: center;
    }
    .reborn-header h1 { font-weight: 700; font-size: 28px; color: var(--primary-green); margin: 0; }
    .reborn-header p { font-size: 14px; color: var(--text-soft); margin-top: 6px; }
    .audio-section, .instruction-box, .questions-panel {
        background: var(--panel-white);
        border-radius: 28px;
        box-shadow: var(--shadow-sm);
        border: 1px solid var(--border-light);
        margin-bottom: 24px;
    }
    .audio-section { padding: 16px 24px; }
    .instruction-box, .questions-panel { padding: 20px 28px; }
    .audio-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
    .badge { font-weight: 600; color: var(--primary-green); background: var(--primary-light); padding: 5px 16px; border-radius: 40px; font-size: 14px; display: inline-block; }
    .btn-sm, .btn-primary { background: var(--primary-light); border: 1px solid var(--border-light); padding: 6px 16px; border-radius: 32px; font-weight: 500; cursor: pointer; color: var(--primary-green); }
    .btn-primary { background: var(--primary-green); color: white; border: none; padding: 8px 24px; }
    .import-bar { margin-top: 12px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .audio-player { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; margin-top: 12px; }
    .play-pause-btn { background: var(--primary-green); border: none; color: white; width: 44px; height: 44px; border-radius: 44px; font-size: 18px; cursor: pointer; transition: all 0.2s; }
    .play-pause-btn:hover { transform: scale(1.05); background: #0a5252; }
    .play-pause-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .progress-container { flex: 1; cursor: pointer; min-width: 200px; }
    .progress-bar-wrapper { width: 100%; height: 6px; background: #dfecec; border-radius: 10px; overflow: hidden; }
    .progress-bar { width: 0; height: 100%; background: var(--primary-green); border-radius: 10px; transition: width 0.1s linear; }
    .time-display { font-size: 13px; font-family: monospace; min-width: 110px; color: var(--text-soft); }
    .speed-select { background: var(--bg-soft); border: 1px solid var(--border-light); border-radius: 20px; padding: 6px 12px; font-size: 13px; cursor: pointer; color: var(--text-dark); }
    .group { border: 1px solid var(--border-light); border-radius: 20px; padding: 18px 22px; margin: 24px 0; background: var(--panel-white); }
    .group h4 { color: var(--primary-green); font-weight: 600; margin-bottom: 12px; font-size: 1.2rem; }
    .instructions { background: var(--bg-soft); padding: 10px 14px; border-radius: 14px; margin-bottom: 20px; font-size: 14px; color: var(--text-dark); }
    p { margin: 12px 0; line-height: 1.8; color: var(--text-dark); }
    .radio-option { margin: 12px 0; display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .radio-option input[type=&quot;radio&quot;] { width: 18px; height: 18px; cursor: pointer; margin: 0; accent-color: var(--primary-green); }
    .radio-option label { cursor: pointer; margin: 0; line-height: 1.5; color: var(--text-dark); }
    .match-row { display: flex; align-items: center; gap: 20px; margin: 16px 0; flex-wrap: wrap; }
    .match-q b { font-weight: 600; min-width: 150px; color: var(--text-dark); }
    .match-slot {
        min-width: 220px;
        min-height: 46px;
        padding: 6px 12px;
        border-radius: 10px;
        border: 2px dashed var(--border-light);
        background: var(--bg-soft);
        display: inline-flex;
        align-items: center;
        transition: all 0.2s;
    }
    .match-slot.drag-over { border-color: var(--primary-green); background: var(--primary-light); }
    .match-slot.filled { border-style: solid; border-color: var(--primary-green); background: var(--panel-white); }
    .tag {
        display: inline-flex;
        align-items: center;
        padding: 6px 14px;
        background: var(--primary-light);
        border: 1px solid var(--primary-green);
        border-radius: 24px;
        cursor: grab;
        user-select: none;
        font-weight: 500;
        color: var(--primary-green);
        font-size: 0.9rem;
    }
    .tag:active { cursor: grabbing; }
    .drag-pool {
        background: var(--bg-soft);
        padding: 16px;
        border-radius: 16px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 16px;
        border: 1px solid var(--border-light);
    }
    .drag-option {
        background: var(--panel-white);
        border: 1px solid var(--border-light);
        border-radius: 24px;
        padding: 8px 16px;
        cursor: grab;
        user-select: none;
        font-size: 0.9rem;
        transition: all 0.2s;
        color: var(--text-dark);
    }
    .drag-option:active { cursor: grabbing; }
    .drag-option.hidden-in-pool { display: none !important; }
    .matching-flex {
        display: flex;
        flex-wrap: wrap;
        gap: 40px;
        justify-content: space-between;
    }
    .match-list { flex: 2; min-width: 320px; }
    .matching-options { flex: 1; min-width: 260px; }
    .bottom-bar {
        margin-top: 20px; display: flex; justify-content: space-between; align-items: center;
        flex-wrap: wrap; gap: 15px; background: var(--panel-white); border-radius: 60px;
        padding: 12px 24px; border: 1px solid var(--border-light);
    }
    .q-nav-container { display: flex; gap: 8px; flex-wrap: wrap; }
    .q-nav-item {
        background: var(--bg-soft); border-radius: 30px; padding: 6px 14px;
        font-weight: 500; font-size: 14px; cursor: pointer;
        border: 1px solid transparent;
        transition: all 0.2s;
        color: var(--text-dark);
    }
    .q-nav-item:hover { transform: scale(1.05); background: var(--primary-light); }
    .q-nav-item.answered { background: var(--answered-bg); border-color: var(--answered-border); color: var(--primary-green); }
    .q-nav-item.correct { background: var(--correct-bg); border-color: var(--correct-border); }
    .q-nav-item.incorrect { background: var(--incorrect-bg); border-color: var(--incorrect-border); }
    .bb-center { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    #timer { font-family: monospace; font-size: 18px; font-weight: 600; color: var(--primary-green); }
    .early-submit { background: #c97e5a; color: white; border: none; padding: 8px 16px; border-radius: 32px; cursor: pointer; font-weight: 500; }
    .results-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 24px;
        background: var(--panel-white);
        border-radius: 16px;
        overflow: hidden;
    }
    .results-table th, .results-table td {
        border: 1px solid var(--border-light);
        padding: 12px 16px;
        text-align: left;
        vertical-align: middle;
    }
    .results-table th {
        background: var(--primary-green);
        color: white;
        font-weight: 600;
        font-size: 15px;
    }
    .results-table td {
        background: var(--panel-white);
        color: var(--text-dark);
    }
    .result-correct {
        color: #15803d;
        font-weight: 600;
        background: #dcfce7;
        text-align: center;
    }
    .result-incorrect {
        color: #b91c1c;
        font-weight: 600;
        background: #fee2e2;
        text-align: center;
    }
    body:not(.light-mode) .result-correct {
        color: #4ade80;
        background: #1a3a2a;
    }
    body:not(.light-mode) .result-incorrect {
        color: #f87171;
        background: #3a1a1a;
    }
    .results-table td:first-child {
        font-weight: 600;
        background: var(--bg-soft);
        text-align: center;
        width: 80px;
    }
    #toast { position: fixed; bottom: 90px; right: 24px; background: var(--primary-green); color: white; padding: 10px 20px; border-radius: 40px; opacity: 0; transition: 0.2s; z-index: 1000; font-size: 14px; }
    #toast.show { opacity: 1; }
    .hl { background: #fff59d; }
    .hl-blue { background: #CEDDFE; cursor: pointer; }
    #selbar { position: absolute; background: white; border: 1px solid #ccc; border-radius: 10px; padding: 6px; gap: 6px; display: inline-flex; z-index: 101; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    #selbar[hidden] { display: none; }
    #selbar button { border: 1px solid #ccc; border-radius: 8px; padding: 4px 12px; background: #f0f0f0; cursor: pointer; font-size: 12px; }
    #notes { position: fixed; right: -420px; top: 0; bottom: 0; width: 420px; background: var(--bg-soft); border-left: 1px solid var(--border-light); transition: right 0.25s ease; z-index: 99; display: flex; flex-direction: column; }
    body.notes-open #notes { right: 0; }
    body.notes-open { padding-right: 420px; }

    &lt;script&gt;
        // ======================= 密码验证逻辑 =======================
        let currentPassword = &quot;61211216&quot;;
        let pendingModify = false, newPasswordStep = 0, firstNewPwd = &quot;&quot;;
        
        function updateDate() {
            const now = new Date();
            document.getElementById('yearPwd').textContent = now.getFullYear();
            document.getElementById('monthPwd').textContent = String(now.getMonth() + 1).padStart(2, '0');
            document.getElementById('dayPwd').textContent = String(now.getDate()).padStart(2, '0');
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            document.getElementById('weekdayPwd').textContent = weekdays[now.getDay()];
        }
        
        function setupTheme() {
            const slider = document.getElementById('themeSliderPwd');
            const toggle = () =&gt; {
                document.body.classList.toggle('light-mode');
                localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
            };
            if(slider) slider.addEventListener('click', toggle);
            if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
        }
        
        function handlePassword() {
            const input = document.getElementById('passwordInput');
            const errorDiv = document.getElementById('errorMsg');
            const val = input.value;
            
            if(val === &quot;liuyangfromxinchangzhejiang&quot;) {
                pendingModify = true; newPasswordStep = 0; firstNewPwd = &quot;&quot;;
                input.value = &quot;&quot;; errorDiv.textContent = &quot;&quot;; return;
            }
            if(pendingModify) {
                if(newPasswordStep === 0) { firstNewPwd = val; newPasswordStep = 1; input.value = &quot;&quot;; return; }
                else if(newPasswordStep === 1) {
                    if(val === firstNewPwd &amp;&amp; val.length &gt; 0) currentPassword = firstNewPwd;
                    pendingModify = false; newPasswordStep = 0; firstNewPwd = &quot;&quot;;
                    input.value = &quot;&quot;; errorDiv.textContent = &quot;&quot;; return;
                }
            }
            if(val === currentPassword) { loadExam(); } 
            else { errorDiv.textContent = &quot;密码错误，请重试&quot;; input.value = &quot;&quot;; input.focus(); pendingModify = false; }
        }
        
        // Peer Assessment 题目
        const EXAM_QUESTIONS_HTML = `
          &lt;div class=&quot;group&quot;&gt;
            &lt;h4&gt;Questions 21-24&lt;/h4&gt;
            &lt;p class=&quot;instructions&quot;&gt;Choose the correct letter, &lt;b&gt;A&lt;/b&gt;, &lt;b&gt;B&lt;/b&gt; or &lt;b&gt;C&lt;/b&gt;.&lt;/p&gt;
            
            &lt;p&gt;&lt;b&gt;21.&lt;/b&gt; Sally and Steve agree that many students are skeptical about peer assessment because&lt;/p&gt;
            &lt;div class=&quot;radio-option&quot;&gt;&lt;input type=&quot;radio&quot; name=&quot;q21&quot; value=&quot;A&quot; id=&quot;q21a&quot;&gt;&lt;label for=&quot;q21a&quot;&gt;&lt;b&gt;A&lt;/b&gt; they think tutors use it to save time.&lt;/label&gt;&lt;/div&gt;
            &lt;div class=&quot;radio-option&quot;&gt;&lt;input type=&quot;radio&quot; name=&quot;q21&quot; value=&quot;B&quot; id=&quot;q21b&quot;&gt;&lt;label for=&quot;q21b&quot;&gt;&lt;b&gt;B&lt;/b&gt; they feel it is not a reliable way to mark work.&lt;/label&gt;&lt;/div&gt;
            &lt;div class=&quot;radio-option&quot;&gt;&lt;input type=&quot;radio&quot; name=&quot;q21&quot; value=&quot;C&quot; id=&quot;q21c&quot;&gt;&lt;label for=&quot;q21c&quot;&gt;&lt;b&gt;C&lt;/b&gt; they do not understand the marking system.&lt;/label&gt;&lt;/div&gt;
            
            &lt;p&gt;&lt;b&gt;22.&lt;/b&gt; What does Sally say is the main advantage of peer assessment?&lt;/p&gt;
            &lt;div class=&quot;radio-option&quot;&gt;&lt;input type=&quot;radio&quot; name=&quot;q22&quot; value=&quot;A&quot; id=&quot;q22a&quot;&gt;&lt;label for=&quot;q22a&quot;&gt;&lt;b&gt;A&lt;/b&gt; It helps students to rapport with each other.&lt;/label&gt;&lt;/div&gt;
            &lt;div class=&quot;radio-option&quot;&gt;&lt;input type=&quot;radio&quot; name=&quot;q22&quot; value=&quot;B&quot; id=&quot;q22b&quot;&gt;&lt;label for=&quot;q22b&quot;&gt;&lt;b&gt;B&lt;/b&gt; It allows students to reflect on their own performance.&lt;/label&gt;&lt;/div&gt;
            &lt;div class=&quot;radio-option&quot;&gt;&lt;input type=&quot;radio&quot; name=&quot;q22&quot; value=&quot;C&quot; id=&quot;q22c&quot;&gt;&lt;label for=&quot;q22c&quot;&gt;&lt;b&gt;C&lt;/b&gt; It saves time spent going over things in class.&lt;/label&gt;&lt;/div&gt;
            
            &lt;p&gt;&lt;b&gt;23.&lt;/b&gt; What happens if a tutor thinks the marks for an assignment are wrong?&lt;/p&gt;
            &lt;div class=&quot;radio-option&quot;&gt;&lt;input type=&quot;radio&quot; name=&quot;q23&quot; value=&quot;A&quot; id=&quot;q23a&quot;&gt;&lt;label for=&quot;q23a&quot;&gt;&lt;b&gt;A&lt;/b&gt; The students mark them again.&lt;/label&gt;&lt;/div&gt;
            &lt;div class=&quot;radio-option&quot;&gt;&lt;input type=&quot;radio&quot; name=&quot;q23&quot; value=&quot;B&quot; id=&quot;q23b&quot;&gt;&lt;label for=&quot;q23b&quot;&gt;&lt;b&gt;B&lt;/b&gt; The tutor remarks all the assignments.&lt;/label&gt;&lt;/div&gt;
            &lt;div class=&quot;radio-option&quot;&gt;&lt;input type=&quot;radio&quot; name=&quot;q23&quot; value=&quot;C&quot; id=&quot;q23c&quot;&gt;&lt;label for=&quot;q23c&quot;&gt;&lt;b&gt;C&lt;/b&gt; The tutor gives the students sample answers.&lt;/label&gt;&lt;/div&gt;
            
            &lt;p&gt;&lt;b&gt;24.&lt;/b&gt; In the research project Sally describes, the presentations were assessed by&lt;/p&gt;
            &lt;div class=&quot;radio-option&quot;&gt;&lt;input type=&quot;radio&quot; name=&quot;q24&quot; value=&quot;A&quot; id=&quot;q24a&quot;&gt;&lt;label for=&quot;q24a&quot;&gt;&lt;b&gt;A&lt;/b&gt; both students and lecturers.&lt;/label&gt;&lt;/div&gt;

            function restoreAnswers() {
                for(let i=21;i&lt;=24;i++) { if(userAnswers['q'+i]) { let r = document.querySelector(`input[name=&quot;q${i}&quot;][value=&quot;${userAnswers['q'+i]}&quot;]`); if(r) r.checked = true; } }
                for(let i=25;i&lt;=30;i++) { if(userAnswers['q'+i]) { let slot = document.querySelector(`.match-slot[data-q=&quot;${i}&quot;]`); let opt = document.querySelector(`.drag-option[data-value=&quot;${userAnswers['q'+i]}&quot;]`); if(slot &amp;&amp; opt &amp;&amp; !slot.classList.contains('filled')) { let tag = document.createElement('span'); tag.className = 'tag'; tag.setAttribute('draggable','true'); tag.dataset.value = userAnswers['q'+i]; tag.textContent = opt.textContent; slot.innerHTML = ''; slot.appendChild(tag); slot.classList.add('filled'); let pool = slot.closest('.group').querySelector('.drag-pool'); if(pool &amp;&amp; pool.dataset.reusable !== 'true') opt.classList.add('hidden-in-pool'); attachTagDrag(tag); } } }

                slots.forEach(slot =&gt; { slot.ondragover = e =&gt; e.preventDefault(); slot.ondrop = e =&gt; { e.preventDefault(); let val = e.dataTransfer.getData('text/plain'); let source = document.querySelector(`.drag-option[data-value=&quot;${val}&quot;]`); if(!source) return; let existingTag = slot.querySelector('.tag'); if(existingTag) { let oldVal = existingTag.dataset.value; let oldOpt = document.querySelector(`.drag-option[data-value=&quot;${oldVal}&quot;]`); if(oldOpt) oldOpt.classList.remove('hidden-in-pool'); existingTag.remove(); } let tag = document.createElement('span'); tag.className = 'tag'; tag.setAttribute('draggable','true'); tag.dataset.value = val; tag.textContent = source.textContent; slot.innerHTML = ''; slot.appendChild(tag); slot.classList.add('filled'); let pool = slot.closest('.group').querySelector('.drag-pool'); if(pool &amp;&amp; pool.dataset.reusable !== 'true') source.classList.add('hidden-in-pool'); attachTagDrag(tag); let qNum = slot.dataset.q; userAnswers['q'+qNum] = val; updateNav(); saveToLocal(); }; });
                let pool = document.querySelector('.drag-pool'); if(pool) { pool.ondragover = e =&gt; e.preventDefault(); pool.ondrop = e =&gt; { let tag = draggedItem?.closest('.tag'); if(tag &amp;&amp; draggedItem) { let slot = tag.closest('.match-slot'); if(slot) { let val = tag.dataset.value; let opt = document.querySelector(`.drag-option[data-value=&quot;${val}&quot;]`); if(opt) opt.classList.remove('hidden-in-pool'); tag.remove(); slot.classList.remove('filled'); slot.innerHTML = ''; let qNum = slot.dataset.q; delete userAnswers['q'+qNum]; updateNav(); saveToLocal(); } } }; }
            }
            function attachTagDrag(tag) { tag.ondragstart = e =&gt; { draggedItem = tag; e.dataTransfer.setData('text/plain', tag.dataset.value); }; tag.ondragend = e =&gt; {}; }
            
            function buildNav() { let nav = document.getElementById('qNavContainer'); if(!nav) return; nav.innerHTML = ''; Q_LIST.forEach(num =&gt; { let div = document.createElement('div'); div.className = 'q-nav-item'; div.textContent = num; div.onclick = () =&gt; { if(parseInt(num) &lt;= 24) { let target = document.querySelector(`input[name=&quot;q${num}&quot;]`); if(target) target.scrollIntoView({ behavior: 'smooth', block: 'center' }); } else { let target = document.querySelector(`.match-slot[data-q=&quot;${num}&quot;]`); if(target) target.scrollIntoView({ behavior: 'smooth', block: 'center' }); } }; nav.appendChild(div); }); updateNav(); }
            
            function updateNav() { let items = document.querySelectorAll('.q-nav-item'); Q_LIST.forEach((num, idx) =&gt; { let item = items[idx]; if(!item) return; let answered = false; if(parseInt(num) &lt;= 24) { let checked = document.querySelector(`input[name=&quot;q${num}&quot;]:checked`); answered = !!checked; } else { let slot = document.querySelector(`.match-slot[data-q=&quot;${num}&quot;]`); answered = slot &amp;&amp; slot.classList.contains('filled'); } item.classList.toggle('answered', answered); if(isFinished) { let correct = false; if(parseInt(num) &lt;= 24) { let userVal = document.querySelector(`input[name=&quot;q${num}&quot;]:checked`)?.value; correct = userVal === ANSWER_KEY.single['q'+num]; } else { let slot = document.querySelector(`.match-slot[data-q=&quot;${num}&quot;] .tag`); let userVal = slot ? slot.dataset.value : null; correct = userVal === ANSWER_KEY.matching['q'+num]; } item.classList.add(correct ? 'correct' : 'incorrect'); } }); }
            
            function finishTest() {

            function setupAudioControls() {

                function updateProgress() {

                window.onmousemove = (e) =&gt; { if(scrubbing) setProgress(e); };
                window.onmouseup = () =&gt; scrubbing = false;
                function setProgress(e) { if(!audioElement.duration) return; let rect=progressWrap.getBoundingClientRect(); let p=Math.min(1,Math.max(0,(e.clientX-rect.left)/rect.width)); audioElement.currentTime=p*audioElement.duration; updateProgress(); }
                
                playBtn.onclick = () =&gt; {
                    if(firstPlayActive &amp;&amp; !examCompleted) { showToast('First play must complete without interruption'); return; }
                    if(audioElement.paused) {
                        audioElement.play();
                        if(!examStarted &amp;&amp; !firstPlayActive) {
                            firstPlayActive = true; examStarted = true;
                            document.getElementById('finishBtn').disabled = false;
                            document.getElementById('earlySubmitBtn').disabled = false;
                            startTimer();
                            audioElement.onended = () =&gt; { examCompleted = true; examStarted = false; firstPlayActive = false; showToast('Audio finished. Click Finish to submit.'); renderAudioManager(); };
                        }
                    } else { audioElement.pause(); }
                    updatePlayButton();
                };
                function updatePlayButton() { if(playBtn) playBtn.textContent = audioElement.paused ? '▶' : '❚❚'; }
                audioElement.onplay = updatePlayButton;
                audioElement.onpause = updatePlayButton;
                
                confirmBtn.onclick = () =&gt; {
                    if(!audioElement) { showToast('No audio loaded'); return; }
                    if(examStarted) { showToast('Exam already started'); return; }
                    firstPlayActive = true; examStarted = true;
                    document.getElementById('finishBtn').disabled = false;
                    document.getElementById('earlySubmitBtn').disabled = false;
                    startTimer();
                    audioElement.play();
                    audioElement.onended = () =&gt; { examCompleted = true; examStarted = false; firstPlayActive = false; showToast('Audio finished. Click Finish to submit.'); renderAudioManager(); };
                };
            }
            
            function initNotesSystem() {
                let selbar = document.getElementById('selbar');
                let currentRange = null;
                document.addEventListener('mouseup', (e) =&gt; {
                    if(e.target.closest('#selbar, #notes')) return;
                    let sel = window.getSelection();
                    if(!sel.isCollapsed &amp;&amp; sel.toString().trim()) {
                        currentRange = sel.getRangeAt(0);
                        let rect = currentRange.getBoundingClientRect();
                        if(selbar) { selbar.hidden = false; selbar.style.left = `${window.scrollX + rect.left + rect.width/2 - 80}px`; selbar.style.top = `${window.scrollY + rect.top - 45}px`; }
                    } else if(selbar) selbar.hidden = true;
                });
                if(selbar) {
                    selbar.addEventListener('click', (e) =&gt; {
                        let act = e.target.dataset.act;
                        if(!act || !currentRange) return;
                        if(act === 'hl') { let span = document.createElement('span'); span.className = 'hl'; try { currentRange.surroundContents(span); } catch(e) {} }
                        else if(act === 'note') {
                            let span = document.createElement('span'); span.className = 'hl-blue'; let hid = 'note_'+Date.now(); span.dataset.hid = hid;
                            try {
                                currentRange.surroundContents(span);
                                let card = document.createElement('div'); card.className = 'note-card'; card.dataset.hid = hid;
                                card.innerHTML = `&lt;div class=&quot;note-quote&quot;&gt;${escapeHtml(span.textContent)}&lt;/div&gt;&lt;textarea placeholder=&quot;Write your note...&quot;&gt;&lt;/textarea&gt;&lt;div class=&quot;note-actions&quot;&gt;&lt;button data-del=&quot;${hid}&quot;&gt;Delete&lt;/button&gt;&lt;/div&gt;`;
                                card.querySelector('button').onclick = () =&gt; { let target = document.querySelector(`[data-hid=&quot;${hid}&quot;]`); if(target) { let text = document.createTextNode(target.textContent); target.parentNode.replaceChild(text, target); } card.remove(); saveToLocal(); };
                                card.querySelector('textarea').addEventListener('input', () =&gt; saveToLocal());
                                document.getElementById('notes-list').prepend(card);
                                document.body.classList.add('notes-open');
                                saveToLocal();
                            } catch(e) {}
                        }
                        selbar.hidden = true; window.getSelection().removeAllRanges();
                    });
                }
                let toggleBtn = document.getElementById('toggle-notes-btn'), closeBtn = document.getElementById('notes-close');
                if(toggleBtn) toggleBtn.onclick = () =&gt; document.body.classList.toggle('notes-open');
                if(closeBtn) closeBtn.onclick = () =&gt; document.body.classList.remove('notes-open');
                
                const savedData = localStorage.getItem('reborn_peer_assessment');
                if(savedData) {
                    try {
                        const data = JSON.parse(savedData);
                        if(data.notesHTML &amp;&amp; document.getElementById('notes-list')) {
                            document.getElementById('notes-list').innerHTML = data.notesHTML;
                            document.querySelectorAll('.note-card').forEach(card =&gt; {
                                const hid = card.dataset.hid;
                                const delBtn = card.querySelector('button');
                                const textarea = card.querySelector('textarea');
                                if(delBtn) delBtn.onclick = () =&gt; { let target = document.querySelector(`[data-hid=&quot;${hid}&quot;]`); if(target) { let text = document.createTextNode(target.textContent); target.parentNode.replaceChild(text, target); } card.remove(); saveToLocal(); };
                                if(textarea) textarea.addEventListener('input', () =&gt; saveToLocal());
                            });
                        }
                    } catch(e) {}
                }
            }
            
            document.getElementById('finishBtn').onclick = () =&gt; { if(!isFinished &amp;&amp; examCompleted) finishTest(); else if(!examCompleted) showToast(&quot;Wait for audio to finish or use Early Submit&quot;); else finishTest(); };
            document.getElementById('earlySubmitBtn').onclick = () =&gt; { if(examStarted &amp;&amp; !examCompleted) { if(confirm('Early submission?')) { if(audioElement) audioElement.pause(); examStarted = false; examCompleted = true; finishTest(); } } };
            document.getElementById('saveBtn').onclick = () =&gt; { saveToLocal(); showToast('Progress saved'); };
            document.getElementById('clearBtn').onclick = clearAll;
            
            renderAudioManager();
            initNotesSystem();
            loadFromLocal();
        }
        
        document.getElementById('confirmPwdBtn').addEventListener('click', handlePassword);
        document.getElementById('passwordInput').addEventListener('keypress', e =&gt; { if(e.key === 'Enter') handlePassword(); });
        updateDate(); setupTheme(); setInterval(updateDate, 86400000);
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开 新生留学官网
    function openREBORNEDU(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://liuyanglouise.github.io/reborner-rukou/main.html', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击 新生留学 Logo 的埋点
     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击 新生留学 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openREBORNEDU(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openREBORNEDU(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openREBORNEDU(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openREBORNEDU;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
