    .hexagon:nth-child(3) { top: 10px; left: -35px; transform: scale(0.85); opacity: 0.8; }
    .hexagon:nth-child(4) { top: 40px; left: 18px; transform: scale(0.7); opacity: 0.6; }
    .hexagon:nth-child(5) { top: 40px; left: -18px; transform: scale(0.7); opacity: 0.6; }
    @keyframes hexagonGroupAppear {

        20% { opacity: 1; transform: scale(1) rotate(0); }

        background: var(--bg-soft);

        background: var(--panel-white);

    body:not(.light-mode) input, body:not(.light-mode) textarea, body:not(.light-mode) select {
        color: #e0e0e0;

    }
    body:not(.light-mode) input[type="radio"], body:not(.light-mode) input[type="checkbox"] { accent-color: var(--primary-green); }
    
    /* Notes & Highlighter */
    .hl { background: #fff59d; }
    body:not(.light-mode) .hl { background: #a16207; }
    .hl-blue { background: #CEDDFE; cursor: pointer; }
    body:not(.light-mode) .hl-blue { background: #312e81; }
    #selbar { position: absolute; background: white; border-radius: 10px; padding: 6px; gap: 6px; display: inline-flex; z-index: 101; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    #selbar[hidden] { display: none; }
    #selbar button { border: 1px solid #ccc; border-radius: 8px; padding: 4px 12px; background: #f0f0f0; cursor: pointer; }
    body:not(.light-mode) #selbar { background: #2a2a2a; border-color: #555; }
    body:not(.light-mode) #selbar button { background: #3a3a3a; color: #e0e0e0; border-color: #555; }
    .note-card { background: var(--panel-white); border-radius: 12px; padding: 12px; margin-bottom: 12px; border: 1px solid var(--border-light); }
    .note-quote { font-weight: 500; margin-bottom: 10px; padding: 6px; background: var(--bg-soft); border-radius: 8px; color: var(--text-dark); }
    .note-card textarea { width: 100%; min-height: 60px; padding: 8px; border-radius: 8px; border: 1px solid var(--border-light); background: var(--bg-soft); color: var(--text-dark); }

    body.notes-open { padding-right: 420px; }
    #notes { position: fixed; right: -420px; top: 0; bottom: 64px; width: 420px; background: var(--bg-soft); border-left: 1px solid var(--border-light); transition: right 0.25s ease; z-index: 99; display: flex; flex-direction: column; }

<body>
    <!-- 密码页面 -->
    <div id="passwordPage" class="password-container">
        <div class="theme-slider-container"><div class="theme-slider" id="themeSliderPwd"><div class="slider-dot"></div></div></div>
        <div class="logo-section">
            <div class="logo-container">
                <div class="hexagon-icon"><div class="hexagon"></div><div class="hexagon"></div><div class="hexagon"></div><div class="hexagon"></div><div class="hexagon"></div></div>
                <div class="logo-text-block"><div class="logo-main">Reborn新生留学</div><div class="logo-sub">密卷练习界面</div></div>

        </div>

                <div class="password-label">请输入密码</div>

        </div>
    </div>

    <!-- P3 做题页面容器 (Climate Change and Allergies) -->
    <div id="p3Container" class="hidden-page p3-wrapper"></div>
    <div id="toast"></div>
    <div id="selbar" hidden><button data-act="hl">Highlight</button><button data-act="note">Note</button><button data-act="del">Clear</button></div>
    <div id="notes">
        <div class="side-panel-header"><span>My Notes</span><button id="notes-close" style="background:none; border:none; font-size:24px; cursor:pointer;">&times;</button></div>
        <div id="notes-list"></div>
    </div>

    <script>
        // ==================== 密码管理 ====================
        let currentPassword = "61211216";
        let pendingModify = false, newPasswordStep = 0, firstNewPwd = "";
        
        function updateDate() {
            const now = new Date();
            document.getElementById('yearPwd').textContent = now.getFullYear();
            document.getElementById('monthPwd').textContent = String(now.getMonth() + 1).padStart(2,'0');
            document.getElementById('dayPwd').textContent = String(now.getDate()).padStart(2,'0');
            document.getElementById('weekdayPwd').textContent = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'][now.getDay()];
        }
        
        function setupTheme() {
            const slider = document.getElementById('themeSliderPwd');
            if(slider) {
                slider.addEventListener('click', () => {
                    document.body.classList.toggle('light-mode');
                    localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
                });
            }
            if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
        }
        
        function handlePassword() {
            const input = document.getElementById('passwordInput');
            const errorDiv = document.getElementById('errorMsg');
            const val = input.value;
            
            if(val === "liuyangfromxinchangzhejiang") {
                pendingModify = true;
                newPasswordStep = 0;
                input.value = "";
                errorDiv.textContent = "";
                return;
            }
            
            if(pendingModify) {
                if(newPasswordStep === 0) {
                    firstNewPwd = val;
                    newPasswordStep = 1;
                    input.value = "";
                    errorDiv.textContent = "";
                    return;
                } else if(newPasswordStep === 1) {
                    if(val === firstNewPwd && val.length > 0) currentPassword = firstNewPwd;
                    pendingModify = false;
                    newPasswordStep = 0;
                    input.value = "";
                    errorDiv.textContent = "";
                    return;
                }
            }
            
            if(val === currentPassword) {
                document.getElementById('passwordPage').classList.add('hidden-page');
                document.getElementById('p3Container').classList.remove('hidden-page');
                if(!window.p3Loaded) loadP3Content();
            } else {
                errorDiv.textContent = "密码错误，请重试";
                input.value = "";
                input.focus();
                pendingModify = false;
            }
        }
        
        // ==================== Climate Change and Allergies 完整功能 ====================
        let p3Audio = null, p3AudioSrc = null, p3ExamStarted = false, p3ExamCompleted = false, p3FirstPlayActive = false;
        let p3TimerSeconds = 0, p3TimerInterval = null, p3UserAnswers = { single: {}, matching: {} }, p3IsFinished = false;
        
        // 题目内容 - Climate Change and Allergies
        const P3_QUESTIONS_HTML = `
            <div class="group">
                <h4>Questions 21-25</h4>
                <p class="instructions">Choose the correct letter, <b>A</b>, <b>B</b> or <b>C</b>.</p>
                <p><b>21</b> Why is Beth unconvinced that allergies are linked to vitamin D deficiency?</p>
                <div class="radio-option"><input type="radio" name="q21" value="A"><label><b>A</b> because people's diets have improved since the 1950s</label></div>
                <div class="radio-option"><input type="radio" name="q21" value="B"><label><b>B</b> because most people get enough vitamin D</label></div>
                <div class="radio-option"><input type="radio" name="q21" value="C"><label><b>C</b> because the evidence only applies in Britain</label></div>
                <p><b>22</b> Eliot explains that rising CO2 levels</p>
                <div class="radio-option"><input type="radio" name="q22" value="A"><label><b>A</b> will mean distribution of pollen over a wider area.</label></div>
                <div class="radio-option"><input type="radio" name="q22" value="B"><label><b>B</b> are having less impact on pollen than milder winters.</label></div>
                <div class="radio-option"><input type="radio" name="q22" value="C"><label><b>C</b> are responsible for higher quantities of pollen.</label></div>
                <p><b>23</b> What does Beth say about seasonal changes?</p>
                <div class="radio-option"><input type="radio" name="q23" value="A"><label><b>A</b> There is no clear short-term trend for the arrival of spring.</label></div>
                <div class="radio-option"><input type="radio" name="q23" value="B"><label><b>B</b> In general, spring is likely to continue arriving early.</label></div>
                <div class="radio-option"><input type="radio" name="q23" value="C"><label><b>C</b> Springs are becoming milder and longer.</label></div>
                <p><b>24</b> What point is made about the plant ragweed?</p>
                <div class="radio-option"><input type="radio" name="q24" value="A"><label><b>A</b> It is spreading to more countries.</label></div>
                <div class="radio-option"><input type="radio" name="q24" value="B"><label><b>B</b> It is the most widespread cause of allergies globally.</label></div>
                <div class="radio-option"><input type="radio" name="q24" value="C"><label><b>C</b> It causes the most severe type of allergy.</label></div>
                <p><b>25</b> Why is tree pollen a more serious problem in cities?</p>
                <div class="radio-option"><input type="radio" name="q25" value="A"><label><b>A</b> Trees produce more pollen there.</label></div>
                <div class="radio-option"><input type="radio" name="q25" value="B"><label><b>B</b> There is less to absorb the tree pollen.</label></div>

        const OPT_MAP = {

        function p3ShowToast(msg) { let t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1500); }
        function p3UpdateTimerUI() { let m = Math.floor(p3TimerSeconds/60), s = p3TimerSeconds%60; document.getElementById('p3Timer') && (document.getElementById('p3Timer').textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`); }
        function p3StartTimer() { if(p3TimerInterval) clearInterval(p3TimerInterval); p3TimerInterval = setInterval(() => { p3TimerSeconds++; p3UpdateTimerUI(); }, 1000); }
        function p3StopTimer() { if(p3TimerInterval) clearInterval(p3TimerInterval); p3TimerInterval = null; }
        function p3FormatTime(s) { if(isNaN(s)) return '00:00'; let m = Math.floor(s/60), sec = Math.floor(s%60); return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`; }
        
        function p3ClearAudio() {
            if(p3Audio) { p3Audio.pause(); if(p3AudioSrc) URL.revokeObjectURL(p3AudioSrc); }

            p3ShowToast('Audio cleared');

        function p3HandleAudioImport(file) {
            if(!file || !file.name.match(/\.(mp3|mp4|m4a|wav)$/i)) { p3ShowToast('MP3/MP4/M4A only'); return; }
            if(p3Audio) p3ClearAudio();
            let url = URL.createObjectURL(file);
            p3AudioSrc = url;
            p3Audio = new Audio(url);
            p3ExamStarted = false; p3ExamCompleted = false; p3FirstPlayActive = false;
            const finishBtn = document.getElementById('p3FinishBtn'); if(finishBtn) finishBtn.disabled = true;
            const earlyBtn = document.getElementById('p3EarlySubmitBtn'); if(earlyBtn) earlyBtn.disabled = true;
            p3RenderAudioManager();
            p3ShowToast(`Loaded: ${file.name}`);
        }
        
        function p3RenderAudioManager() {
            const section = document.getElementById('p3AudioSection');
            if(!section) return;

                section.innerHTML = `<div class="audio-header"><span class="badge">🎧 Audio Player</span></div><div class="no-audio">No audio loaded. Import MP3 / MP4.<br>⚠️ First play must complete without interruption.</div><div class="import-bar"><button class="btn-primary" id="p3ImportAudioBtn">📁 Import Audio</button><button class="btn-sm" id="p3ClearAudioBtn">🗑️ Clear</button></div>`;

                return;

            const isLocked = p3FirstPlayActive && !p3ExamCompleted;

                <div class="audio-header"><span class="badge">🎵 Current Audio</span><button class="btn-sm" id="p3DeleteAudioBtn">🗑️ Delete</button></div>

            `;

                    } else { p3Audio.pause(); p3RenderAudioManager(); }

            const confirmBtn = document.getElementById('p3ConfirmStartBtn');
            if(confirmBtn) confirmBtn.onclick = () => {
                if(!p3Audio) { p3ShowToast('No audio loaded'); return; }

                p3FirstPlayActive = true; p3ExamStarted = true;
                document.getElementById('p3FinishBtn').disabled = false;
                document.getElementById('p3EarlySubmitBtn').disabled = false;
                p3StartTimer();
                p3Audio.play();
                p3Audio.addEventListener('ended', () => { p3ExamCompleted = true; p3ExamStarted = false; p3FirstPlayActive = false; p3ShowToast('Audio finished.'); p3RenderAudioManager(); });
                p3RenderAudioManager();
            };
            document.getElementById('p3DeleteAudioBtn')?.addEventListener('click', p3ClearAudio);
            document.getElementById('p3ClearAudioBtn2')?.addEventListener('click', p3ClearAudio);

        function p3AttachRadioEvents() {
            document.querySelectorAll('input[type="radio"]').forEach(radio => {
                radio.addEventListener('change', e => { if(p3IsFinished) return; p3UserAnswers.single[e.target.name] = e.target.value; p3UpdateNav(); p3SaveToLocal(); });
            });
        }
        
        function p3AttachDragDropEvents() {
            const dragOptions = document.querySelectorAll('.drag-option');
            const dropSlots = document.querySelectorAll('.match-slot');
            dragOptions.forEach(opt => {
                opt.setAttribute('draggable', 'true');
                opt.addEventListener('dragstart', e => e.dataTransfer.setData('text/plain', opt.dataset.value));
            });
            dropSlots.forEach(slot => {
                slot.addEventListener('dragover', e => e.preventDefault());
                slot.addEventListener('drop', e => {
                    e.preventDefault();
                    const value = e.dataTransfer.getData('text/plain');
                    const sourceOpt = document.querySelector(`.drag-option[data-value="${value}"]`);
                    if(!sourceOpt) return;
                    const existingTag = slot.querySelector('.tag');
                    if(existingTag) {
                        const oldVal = existingTag.dataset.value;
                        const oldOpt = document.querySelector(`.drag-option[data-value="${oldVal}"]`);
                        if(oldOpt) oldOpt.classList.remove('hidden-in-pool');
                        existingTag.remove();
                    }
                    const tag = document.createElement('span');
                    tag.className = 'tag';
                    tag.dataset.value = value;
                    tag.textContent = sourceOpt.textContent;
                    slot.innerHTML = '';
                    slot.appendChild(tag);
                    slot.classList.add('filled');
                    sourceOpt.classList.add('hidden-in-pool');
                    p3UserAnswers.matching[`q${slot.dataset.q}`] = value;
                    p3UpdateNav();
                    p3SaveToLocal();
                });
            });
            const pool = document.querySelector('.drag-pool');
            if(pool) {
                pool.addEventListener('dragover', e => e.preventDefault());
                pool.addEventListener('drop', e => {
                    e.preventDefault();
                    const tag = e.dataTransfer.getData('text/plain');
                    const slotWithTag = document.querySelector(`.tag[data-value="${tag}"]`)?.closest('.match-slot');
                    if(slotWithTag) {
                        const opt = document.querySelector(`.drag-option[data-value="${tag}"]`);
                        if(opt) opt.classList.remove('hidden-in-pool');
                        slotWithTag.innerHTML = '';
                        slotWithTag.classList.remove('filled');
                        delete p3UserAnswers.matching[`q${slotWithTag.dataset.q}`];
                        p3UpdateNav();
                        p3SaveToLocal();
                    }
                });
            }
        }
        
        function p3BuildNav() {
            const container = document.getElementById('p3QNavContainer');
            if(!container) return;
            container.innerHTML = '';
            P3_Q_LIST.forEach(num => {
                let div = document.createElement('div');
                div.className = 'q-nav-item';
                div.dataset.qnum = num;
                div.textContent = num;
                div.addEventListener('click', () => {
                    if(parseInt(num) <= 25) {
                        document.querySelector(`input[name="q${num}"]`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    } else {
                        document.querySelector(`.match-slot[data-q="${num}"]`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                });
                container.appendChild(div);
            });
            p3UpdateNav();
        }
        
        function p3UpdateNav() {
            P3_Q_LIST.forEach(num => {
                const navItem = document.querySelector(`.q-nav-item[data-qnum="${num}"]`);
                if(!navItem) return;
                let answered = false;
                if(parseInt(num) <= 25) {
                    answered = !!document.querySelector(`input[name="q${num}"]:checked`);
                } else {
                    answered = !!p3UserAnswers.matching[`q${num}`];
                }
                navItem.classList.toggle('answered', answered);
                if(p3IsFinished) {
                    let correct = false;
                    if(parseInt(num) <= 25) {
                        const userVal = document.querySelector(`input[name="q${num}"]:checked`)?.value;
                        correct = userVal === P3_ANSWER_KEY.single[`q${num}`];
                    } else {
                        correct = p3UserAnswers.matching[`q${num}`] === P3_ANSWER_KEY.matching[`q${num}`];
                    }
                    navItem.classList.add(correct ? 'correct' : 'incorrect');
                }
            });
        }
        
        function p3RestoreUserAnswers() {
            // Restore single choice
            for(let i=21; i<=25; i++) {
                if(p3UserAnswers.single[`q${i}`]) {
                    const radio = document.querySelector(`input[name="q${i}"][value="${p3UserAnswers.single[`q${i}`]}"]`);
                    if(radio) radio.checked = true;
                }
            }
            // Restore matching
            for(let i=26; i<=30; i++) {
                const saved = p3UserAnswers.matching[`q${i}`];
                if(saved) {
                    const slot = document.querySelector(`.match-slot[data-q="${i}"]`);
                    const opt = document.querySelector(`.drag-option[data-value="${saved}"]`);
                    if(slot && opt && !slot.classList.contains('filled')) {
                        const tag = document.createElement('span');
                        tag.className = 'tag';
                        tag.dataset.value = saved;
                        tag.textContent = opt.textContent;
                        slot.innerHTML = '';
                        slot.appendChild(tag);
                        slot.classList.add('filled');
                        opt.classList.add('hidden-in-pool');
                    }
                }
            }
        }
        
        function p3FinishTest() {
            if(p3IsFinished) return;
            p3IsFinished = true;
            p3StopTimer();
            document.getElementById('p3FinishBtn').disabled = true;
            document.getElementById('p3EarlySubmitBtn').disabled = true;
            
            // Highlight single choice
            for(let i=21; i<=25; i++) {
                const correct = P3_ANSWER_KEY.single[`q${i}`];
                const userRadio = document.querySelector(`input[name="q${i}"]:checked`);
                if(userRadio) {
                    const label = userRadio.closest('.radio-option');
                    if(userRadio.value === correct) label.style.background = 'var(--correct-bg)';
                    else label.style.background = 'var(--incorrect-bg)';
                }
                const correctInput = document.querySelector(`input[name="q${i}"][value="${correct}"]`);
                if(correctInput && (!userRadio || userRadio.value !== correct)) {
                    correctInput.closest('.radio-option').style.background = 'var(--correct-bg)';
                }
            }
            
            // Highlight matching
            for(let i=26; i<=30; i++) {
                const slot = document.querySelector(`.match-slot[data-q="${i}"]`);
                const tag = slot?.querySelector('.tag');
                const userVal = tag?.dataset.value;
                const correctVal = P3_ANSWER_KEY.matching[`q${i}`];
                if(userVal === correctVal) {
                    slot.style.borderColor = '#4ade80';
                    slot.style.backgroundColor = 'var(--correct-bg)';
                } else {
                    slot.style.borderColor = '#f87171';
                    slot.style.backgroundColor = 'var(--incorrect-bg)';
                }
            }
            
            const resultsTableHTML = p3GenerateResultsTable();
            let resultsContainer = document.querySelector('.results-in-page');
            if(!resultsContainer) { resultsContainer = document.createElement('div'); resultsContainer.className = 'results-in-page'; document.getElementById('p3QuestionsPanel').appendChild(resultsContainer); }
            resultsContainer.innerHTML = resultsTableHTML;
            document.querySelectorAll('input, .drag-option, .tag').forEach(el => { if(el.tagName === 'INPUT') el.disabled = true; if(el.classList?.contains('drag-option')||el.classList?.contains('tag')) el.setAttribute('draggable','false'); });
            p3UpdateNav();
            p3ShowToast('Answers submitted. Review table displayed.');
        }
        
        function p3GenerateResultsTable() {
            let tableHTML = '<h4>📊 Answer Review</h4><table class="results-table"><thead>汽<th>Question</th><th>Your Answer</th><th>Correct Answer</th><th>Result</th> </thead><tbody>';
            
            // Single choice results
            for(let i=21; i<=25; i++) {
                const userRadio = document.querySelector(`input[name="q${i}"]:checked`);
                const userAns = userRadio ? userRadio.closest('label').textContent.trim() : '<i>No Answer</i>';
                const correctLetter = P3_ANSWER_KEY.single[`q${i}`];
                const correctLabel = document.querySelector(`input[name="q${i}"][value="${correctLetter}"]`)?.closest('label')?.textContent.trim() || correctLetter;
                const isCorrect = userRadio?.value === correctLetter;
                tableHTML += `<tr><td style="font-weight:600">${i}</td><td>${escapeHtml(userAns)}</td><td>${escapeHtml(correctLabel)}</td><td class="${isCorrect ? 'result-correct' : 'result-incorrect'}">${isCorrect ? '✔ Correct' : '✖ Incorrect'}</td>`;
            }
            
            // Matching results
            for(let i=26; i<=30; i++) {
                const userCode = p3UserAnswers.matching[`q${i}`];
                const userAns = userCode ? OPT_MAP[userCode] || userCode : '<i>No Answer</i>';
                const correctCode = P3_ANSWER_KEY.matching[`q${i}`];
                const correctAns = OPT_MAP[correctCode] || correctCode;
                const isCorrect = userCode === correctCode;
                tableHTML += `<tr><td style="font-weight:600">${i}</td><td>${escapeHtml(userAns)}</td><td>${escapeHtml(correctAns)}</td><td class="${isCorrect ? 'result-correct' : 'result-incorrect'}">${isCorrect ? '✔ Correct' : '✖ Incorrect'}</td>`;
            }
            return tableHTML + '</tbody></table>';
        }
        
        function p3SaveToLocal() { localStorage.setItem('reborn_climate_allergies', JSON.stringify({ userAnswers: p3UserAnswers, timerSeconds: p3TimerSeconds, isFinished: p3IsFinished })); }
        function p3LoadFromLocal() {

        // Notes & Highlighter System
        let selbar = document.getElementById('selbar');
        let currentSelectionRange = null;
        
        function handleMouseUp(e) {
            if(e.target.closest('#selbar, #notes, .bottom-bar')) return;
            let sel = window.getSelection();
            if(!sel.isCollapsed && sel.toString().trim().length > 0) {
                let range = sel.getRangeAt(0);
                let rect = range.getBoundingClientRect();
                if(rect.width > 0 && rect.height > 0) {
                    currentSelectionRange = range;
                    selbar.hidden = false;
                    selbar.style.left = `${window.scrollX + rect.left + rect.width/2 - 60}px`;
                    selbar.style.top = `${window.scrollY + rect.top - 40}px`;
                } else {
                    selbar.hidden = true;
                }
            } else {
                selbar.hidden = true;
            }
        }
        
        function handleSelbarAction(e) {
            let act = e.target.closest('button')?.dataset.act;
            if(!act) return;
            if(!currentSelectionRange) return;
            let span = document.createElement('span');
            if(act === 'hl') span.className = 'hl';
            else if(act === 'note') span.className = 'hl-blue';
            else if(act === 'del') {
                let parent = currentSelectionRange.commonAncestorContainer;
                let hlSpan = parent.nodeType === 3 ? parent.parentElement : parent;
                if(hlSpan.classList && (hlSpan.classList.contains('hl') || hlSpan.classList.contains('hl-blue'))) {
                    let textNode = document.createTextNode(hlSpan.textContent);
                    hlSpan.parentNode.replaceChild(textNode, hlSpan);
                }
                selbar.hidden = true;
                return;
            }
            try {
                currentSelectionRange.surroundContents(span);
                if(act === 'note') {
                    let hid = 'note_' + Date.now();
                    span.dataset.hid = hid;
                    let quote = span.textContent.trim();
                    let card = document.createElement('div');
                    card.className = 'note-card';
                    card.dataset.hid = hid;
                    card.innerHTML = `<div class="note-quote">${escapeHtml(quote)}</div><textarea placeholder="Write your note..."></textarea><div class="note-actions"><button data-del="${hid}">Delete</button></div>`;
                    let delBtn = card.querySelector('button');
                    delBtn.onclick = () => {
                        let targetSpan = document.querySelector(`[data-hid="${hid}"]`);
                        if(targetSpan) {
                            let textNode = document.createTextNode(targetSpan.textContent);
                            targetSpan.parentNode.replaceChild(textNode, targetSpan);
                        }
                        card.remove();
                        p3SaveToLocal();
                    };
                    let textarea = card.querySelector('textarea');
                    textarea.addEventListener('input', () => p3SaveToLocal());
                    document.getElementById('notes-list').prepend(card);
                    document.body.classList.add('notes-open');
                    p3SaveToLocal();
                }
            } catch(e) { console.warn(e); }
            selbar.hidden = true;
            window.getSelection().removeAllRanges();
        }
        
        function initNotesSystem() {
            document.removeEventListener('mouseup', handleMouseUp);
            document.addEventListener('mouseup', handleMouseUp);
            if(selbar) {
                selbar.removeEventListener('click', handleSelbarAction);
                selbar.addEventListener('click', handleSelbarAction);
            }
        }
        
        function escapeHtml(s) { return s ? s.replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])) : ''; }
        
        document.getElementById('confirmPwdBtn').addEventListener('click', handlePassword);
        document.getElementById('passwordInput').addEventListener('keypress', e => { if(e.key === 'Enter') handlePassword(); });
        updateDate();
        setupTheme();
        setInterval(updateDate, 86400000);
    </script>
   <script>
// 自动加载音频（支持密码页 + 无密码页，自动重试）
function tryLoadAudio() {
  const pageName = location.pathname.split('/').pop().replace('.html', '');
  const audioUrl = pageName + '.mp3';
  const fileInput = document.querySelector('input[type="file"]');

  if (!fileInput) return;
  if (fileInput.files.length > 0) return;

  fetch(audioUrl)
    .then(response => {
      if (!response.ok) throw new Error('音频不存在');
      return response.blob();
    })
    .then(blob => {
      const file = new File([blob], audioUrl, { type: 'audio/mpeg' });
      const dataTransfer = new DataTransfer();
      dataTransfer.items.add(file);
      fileInput.files = dataTransfer.files;
      fileInput.dispatchEvent(new Event('change', { bubbles: true }));
      console.log('✅ 音频自动加载成功:', audioUrl);
    })
    .catch(err => {});
}

window.addEventListener('load', () => {
  tryLoadAudio();
  setInterval(tryLoadAudio, 1000);
});
</script>
