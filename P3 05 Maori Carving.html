<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Reborn新生留学 · 雅思密卷练习</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Roboto', 'Noto Sans SC', sans-serif;
        background-color: #1A1A1A;
        color: #FFFFFF;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
        transition: all 0.3s ease;
    }
    body.light-mode { background-color: #FFFFFF; color: #1A1A1A; }
    .container {
        width: 100%;
        max-width: 800px;
        min-height: 600px;
        background-color: #1A1A1A;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        padding: 40px;
        border-radius: 12px;
        transition: all 0.3s ease;
        position: relative;
    }
    body.light-mode .container { background-color: #FFFFFF; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1); }
    .logo-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 60px; }
    .logo-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; }
    .hexagon-icon { position: relative; width: 60px; height: 70px; margin-bottom: 15px; }
    .hexagon {
        position: absolute;
        width: 60px;
        height: 70px;
        background-color: transparent;
        border: 2px solid #FFFFFF;
        border-radius: 2px;
        animation: hexagonGroupAppear 3.5s ease-in-out infinite;
        opacity: 0;
    }
    body.light-mode .hexagon { border-color: #1A1A1A; }
    .hexagon:nth-child(1) { top: 0; left: 0; }
    .hexagon:nth-child(2) { top: 10px; left: 35px; transform: scale(0.85); opacity: 0.8; }
    .hexagon:nth-child(3) { top: 10px; left: -35px; transform: scale(0.85); opacity: 0.8; }
    .hexagon:nth-child(4) { top: 40px; left: 18px; transform: scale(0.7); opacity: 0.6; }
    .hexagon:nth-child(5) { top: 40px; left: -18px; transform: scale(0.7); opacity: 0.6; }
    @keyframes hexagonGroupAppear {
        0% { opacity: 0; transform: scale(0.8) rotate(10deg); }
        20% { opacity: 1; transform: scale(1) rotate(0); }
        80% { opacity: 1; transform: scale(1) rotate(0); }
        100% { opacity: 0; transform: scale(0.8) rotate(-10deg); }
    }
    .logo-main { font-size: 2.5rem; font-weight: 700; letter-spacing: 1px; line-height: 1.2; color: #FFFFFF; }
    body.light-mode .logo-main { color: #1A1A1A; }
    .logo-sub { font-size: 1.5rem; font-weight: 500; margin-top: 8px; line-height: 1.2; color: #FFFFFF; }
    body.light-mode .logo-sub { color: #1A1A1A; }
    .subtitle { font-size: 1.1rem; font-weight: 300; color: #CCCCCC; letter-spacing: 3px; text-transform: uppercase; margin-top: 10px; }
    body.light-mode .subtitle { color: #666666; }
    .main-content { width: 100%; max-width: 400px; text-align: center; margin: 20px 0; }
    .password-card {
        background: #262626;
        border-radius: 16px;
        padding: 30px 25px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        border: 1px solid #3a3a3a;
    }
    body.light-mode .password-card { background: #F5F5F5; box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08); border: 1px solid #ddd; }
    .password-label { font-size: 1.2rem; font-weight: 500; margin-bottom: 20px; color: #CCCCCC; }
    body.light-mode .password-label { color: #333; }
    .password-input {
        width: 100%;
        padding: 14px 18px;
        font-size: 1rem;
        background-color: #1A1A1A;
        border: 1px solid #3a3a3a;
        border-radius: 12px;
        color: #FFFFFF;
        text-align: center;
        outline: none;
    }
    body.light-mode .password-input { background-color: #FFFFFF; border: 1px solid #ccc; color: #1A1A1A; }
    .error-message { margin-top: 15px; font-size: 0.85rem; color: #ff6b6b; min-height: 40px; }
    .confirm-btn {
        margin-top: 25px;
        background-color: #2c2c2c;
        border: none;
        border-radius: 40px;
        padding: 12px 28px;
        color: #FFFFFF;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        width: 100%;

        transform: translateY(-2px);

    body.light-mode .confirm-btn { background-color: #e0e0e0; color: #1A1A1A; box-shadow: 0 5px 0 #b0b0b0; }
    .confirm-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #121212; }
    .footer { width: 100%; padding-top: 30px; border-top: 1px solid #262626; font-size: 0.9rem; color: #999999; text-align: center; }
    body.light-mode .footer { border-top-color: #E0E0E0; color: #666666; }
    .copyright { font-weight: 300; font-size: 1rem; margin-bottom: 30px; }
    .date-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 8px; }
    .date-item { display: flex; flex-direction: column; align-items: center; min-width: 50px; }
    .date-value { font-size: 1.8rem; font-weight: 600; color: #FFFFFF; line-height: 1; }
    body.light-mode .date-value { color: #1A1A1A; }
    .date-label { font-size: 0.8rem; color: #999999; margin-top: 4px; }
    .weekday { font-size: 1rem; color: #CCCCCC; margin-bottom: 5px; }

    :root {
        --bg-soft: #f0f7f5;
        --panel-white: #ffffff;
        --primary-green: #0F6B6B;
        --primary-light: #e0f0f0;

    }
    .master-container { max-width: 1200px; margin: 0 auto; }
    .reborn-header {
        background: var(--panel-white);
        border-radius: 32px;

    .audio-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
    .badge { font-weight: 600; color: var(--primary-green); background: var(--primary-light); padding: 5px 16px; border-radius: 40px; font-size: 14px; display: inline-block; }
    .btn-sm, .btn-primary { background: var(--primary-light); border: 1px solid var(--border-light); padding: 6px 16px; border-radius: 32px; font-weight: 500; cursor: pointer; color: var(--primary-green); }
    .btn-primary { background: var(--primary-green); color: white; border: none; padding: 8px 24px; }
    .import-bar { margin-top: 12px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .audio-player { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; margin-top: 12px; }
    .play-pause-btn { background: var(--primary-green); border: none; color: white; width: 44px; height: 44px; border-radius: 44px; font-size: 18px; cursor: pointer; transition: all 0.2s; }
    .play-pause-btn:hover { transform: scale(1.05); background: #0a5252; }
    .play-pause-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .progress-container { flex: 1; cursor: pointer; min-width: 200px; }
    .progress-bar-wrapper { width: 100%; height: 6px; background: #dfecec; border-radius: 10px; overflow: hidden; }
    .progress-bar { width: 0; height: 100%; background: var(--primary-green); border-radius: 10px; transition: width 0.1s linear; }
    .time-display { font-size: 13px; font-family: monospace; min-width: 110px; color: var(--text-soft); }
    .speed-select { background: var(--bg-soft); border: 1px solid var(--border-light); border-radius: 20px; padding: 6px 12px; font-size: 13px; cursor: pointer; color: var(--text-dark); }
    .no-audio { background: #fef5e7; border-radius: 20px; padding: 16px; text-align: center; color: #8faa9e; font-size: 14px; }
    .group { border: 1px solid var(--border-light); border-radius: 20px; padding: 18px 22px; margin: 24px 0; }
    .group h4 { color: var(--primary-green); font-weight: 600; margin-bottom: 12px; font-size: 1.2rem; }
    .instructions { background: var(--bg-soft); padding: 10px 14px; border-radius: 14px; margin-bottom: 20px; font-size: 14px; }
    p { margin: 12px 0; line-height: 1.8; }
    .radio-option { margin: 12px 0; display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .radio-option input[type="radio"] { width: 18px; height: 18px; cursor: pointer; margin: 0; accent-color: var(--primary-green); }
    .radio-option label { cursor: pointer; margin: 0; line-height: 1.5; }
    .match-row { display: flex; align-items: center; gap: 20px; margin: 16px 0; flex-wrap: wrap; }
    .match-q b { font-weight: 600; min-width: 150px; }
    .match-slot {
        min-width: 220px;
        min-height: 46px;
        padding: 6px 12px;
        border-radius: 10px;
        border: 2px dashed var(--border-light);
        background: var(--bg-soft);
        display: inline-flex;
        align-items: center;
        transition: all 0.2s;
    }
    .match-slot.drag-over { border-color: var(--primary-green); background: var(--primary-light); }
    .match-slot.filled { border-style: solid; border-color: var(--primary-green); background: var(--panel-white); }
    .tag {
        display: inline-flex;
        align-items: center;
        padding: 6px 14px;
        background: var(--primary-light);
        border: 1px solid var(--primary-green);
        border-radius: 24px;
        cursor: grab;
        user-select: none;
        font-weight: 500;
        color: var(--primary-green);
        font-size: 0.9rem;
    }
    .tag:active { cursor: grabbing; }
    .drag-pool {
        background: var(--bg-soft);
        padding: 16px;
        border-radius: 16px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 16px;
        border: 1px solid var(--border-light);
    }
    .drag-option {
        background: var(--panel-white);
        border: 1px solid var(--border-light);
        border-radius: 24px;
        padding: 8px 16px;
        cursor: grab;
        user-select: none;
        font-size: 0.9rem;
        transition: all 0.2s;
    }
    .drag-option:active { cursor: grabbing; }
    .drag-option.dragging { opacity: 0.5; }
    .drag-option.hidden-in-pool { display: none !important; }
    .matching-flex {
        display: flex;
        flex-wrap: wrap;
        gap: 40px;
        justify-content: space-between;
    }
    .match-list { flex: 2; min-width: 320px; }
    .matching-options { flex: 1; min-width: 260px; }
    .bottom-bar {
        margin-top: 20px; display: flex; justify-content: space-between; align-items: center;
        flex-wrap: wrap; gap: 15px; background: var(--panel-white); border-radius: 60px;
        padding: 12px 24px; border: 1px solid var(--border-light);
    }
    .q-nav-container { display: flex; gap: 8px; flex-wrap: wrap; }
    .q-nav-item {
        background: var(--bg-soft); border-radius: 30px; padding: 6px 14px;
        font-weight: 500; font-size: 14px; cursor: pointer;
        border: 1px solid transparent;
        transition: all 0.2s;
    }
    .q-nav-item:hover { transform: scale(1.05); background: var(--primary-light); }
    .q-nav-item.answered { background: var(--answered-bg); border-color: var(--answered-border); color: var(--primary-green); }
    .q-nav-item.correct { background: var(--correct-bg); border-color: var(--correct-border); }
    .q-nav-item.incorrect { background: var(--incorrect-bg); border-color: var(--incorrect-border); }
    .bb-center { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    #timer { font-family: monospace; font-size: 18px; font-weight: 600; color: var(--primary-green); }
    .early-submit { background: #c97e5a; color: white; border: none; padding: 8px 16px; border-radius: 32px; cursor: pointer; font-weight: 500; }
    .results-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 24px;
        background: var(--panel-white);
        border-radius: 16px;
        overflow: hidden;
    }
    .results-table th, .results-table td {
        border: 1px solid var(--border-light);
        padding: 12px 16px;
        text-align: left;
        vertical-align: middle;
    }
    .results-table th {
        background: var(--primary-green);
        color: white;
        font-weight: 600;
        font-size: 15px;
    }
    .results-table td {
        background: var(--panel-white);
        color: var(--text-dark);
    }
    .result-correct {
        color: #15803d;
        font-weight: 600;
        background: #dcfce7;
        text-align: center;
    }
    .result-incorrect {
        color: #b91c1c;
        font-weight: 600;
        background: #fee2e2;
        text-align: center;
    }
    .results-table td:first-child {
        font-weight: 600;
        background: var(--bg-soft);
        text-align: center;
        width: 80px;
    }
    #toast { position: fixed; bottom: 90px; right: 24px; background: var(--primary-green); color: white; padding: 10px 20px; border-radius: 40px; opacity: 0; transition: 0.2s; z-index: 1000; font-size: 14px; }
    #toast.show { opacity: 1; }
    .hl { background: #fff59d; }
    .hl-blue { background: #CEDDFE; cursor: pointer; }
    #selbar { position: absolute; background: white; border: 1px solid #ccc; border-radius: 10px; padding: 6px; gap: 6px; display: inline-flex; z-index: 101; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    #selbar[hidden] { display: none; }
    #selbar button { border: 1px solid #ccc; border-radius: 8px; padding: 4px 12px; background: #f0f0f0; cursor: pointer; font-size: 12px; }
    #notes { position: fixed; right: -420px; top: 0; bottom: 0; width: 420px; background: var(--bg-soft); border-left: 1px solid var(--border-light); transition: right 0.25s ease; z-index: 99; display: flex; flex-direction: column; }
    body.notes-open #notes { right: 0; }
    body.notes-open { padding-right: 420px; }
    .side-panel-header { display: flex; justify-content: space-between; padding: 12px 16px; background: var(--panel-white); border-bottom: 1px solid var(--border-light); font-weight: 600; }
    #notes-list { overflow-y: auto; padding: 12px; flex: 1; }
    .note-card { background: var(--panel-white); border-radius: 12px; padding: 12px; margin-bottom: 12px; border: 1px solid var(--border-light); }
    .note-quote { font-weight: 500; margin-bottom: 10px; padding: 6px; background: var(--bg-soft); border-radius: 8px; font-size: 13px; }
    .note-card textarea { width: 100%; min-height: 60px; padding: 8px; border-radius: 8px; border: 1px solid var(--border-light); background: var(--bg-soft); font-family: inherit; }
    .note-actions button { background: #fee2e2; border: 1px solid #f87171; border-radius: 20px; padding: 4px 12px; margin-top: 8px; cursor: pointer; color: #b91c1c; font-size: 12px; }
    #toggle-notes-btn { background: var(--bg-soft); border: 1px solid var(--border-light); border-radius: 30px; padding: 6px 14px; cursor: pointer; font-size: 14px; }
    @media (max-width: 768px) {
        .q-nav-container { justify-content: center; }
        .audio-player { flex-direction: column; align-items: stretch; }
        .progress-container { width: 100%; }
        .matching-flex { flex-direction: column; }
        .match-slot { min-width: 180px; }
        .results-table th, .results-table td { padding: 8px 10px; font-size: 12px; }
    }
</style>
</head>
<body>
    <div id="passwordPage" class="container">
        <div class="theme-slider-container">
            <div class="theme-slider" id="themeSliderPwd"><div class="slider-dot"></div></div>
        </div>
        <div class="logo-section">
            <div class="logo-container">
                <div class="hexagon-icon"><div class="hexagon"></div><div class="hexagon"></div><div class="hexagon"></div><div class="hexagon"></div><div class="hexagon"></div></div>
                <div class="logo-text-block"><div class="logo-main">Reborn新生留学</div><div class="logo-sub">密卷练习界面</div></div>
            </div>
            <div class="subtitle">Veni • Vidi • Vici</div>
        </div>
        <div class="main-content">
            <div class="password-card">
                <div class="password-label">请输入密码</div>
                <div class="password-input-wrapper"><input type="password" id="passwordInput" class="password-input" placeholder="········" autocomplete="off"></div>
                <div class="error-message" id="errorMsg"></div>
                <button class="confirm-btn" id="confirmPwdBtn">确认</button>
            </div>
        </div>
        <div class="footer">
            <div class="copyright">天天进步，每日新生</div>
            <div class="date-section">
                <div class="date-container"><div class="date-item"><div class="date-value" id="yearPwd">2026</div><div class="date-label">年</div></div><div class="date-item"><div class="date-value" id="monthPwd">01</div><div class="date-label">月</div></div><div class="date-item"><div class="date-value" id="dayPwd">15</div><div class="date-label">日</div></div></div>
                <div class="weekday" id="weekdayPwd">星期三</div>
                <div class="for-every-reborner">FOR EVERY REBORNER</div>
            </div>
        </div>
    </div>

    <div id="p2ExamContainer"></div>

<script>
    let currentPassword = "61211216";
    let pendingModify = false, newPasswordStep = 0, firstNewPwd = "";
    
    function updateDate() {
        const now = new Date();
        document.getElementById('yearPwd').textContent = now.getFullYear();
        document.getElementById('monthPwd').textContent = String(now.getMonth() + 1).padStart(2, '0');
        document.getElementById('dayPwd').textContent = String(now.getDate()).padStart(2, '0');
        const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
        document.getElementById('weekdayPwd').textContent = weekdays[now.getDay()];
    }
    
    function setupTheme() {
        const slider = document.getElementById('themeSliderPwd');
        const toggle = () => {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        };
        if(slider) slider.addEventListener('click', toggle);
        if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
    }
    
    function handlePassword() {
        const input = document.getElementById('passwordInput');
        const errorDiv = document.getElementById('errorMsg');
        const val = input.value.trim();
        
        if(val === "liuyangfromxinchangzhejiang") {
            pendingModify = true; newPasswordStep = 0; firstNewPwd = "";
            input.value = ""; errorDiv.textContent = "请输入新密码"; return;
        }
        if(pendingModify) {
            if(newPasswordStep === 0) {
                firstNewPwd = val;
                newPasswordStep = 1;
                input.value = "";
                errorDiv.textContent = "请再次确认新密码";
                return;
            } else if(newPasswordStep === 1) {
                if(val === firstNewPwd && val.length > 0) {
                    currentPassword = firstNewPwd;
                    errorDiv.textContent = "密码修改成功！";
                } else {
                    errorDiv.textContent = "两次密码不一致，修改失败";
                }
                pendingModify = false; newPasswordStep = 0; firstNewPwd = "";
                input.value = "";
                setTimeout(()=>errorDiv.textContent="",2000);
                return;
            }
        }
        if(val === currentPassword) {
            loadExam();
        } else {
            errorDiv.textContent = "密码错误，请重试";
            input.value = "";
            input.focus();
            pendingModify = false;
        }
    }

    const EXAM_QUESTIONS_HTML = `
      <div class="group">
        <h4>Questions 21-25</h4>
        <p class="instructions">Choose the correct letter, <b>A</b>, <b>B</b> or <b>C</b>.</p>
        
        <p><b>21.</b> Amy and Mike agree that the greenstone tikis</p>
        <div class="radio-option"><input type="radio" name="q21" value="A" id="q21a"><label for="q21a"><b>A</b> take great skill to produce.</label></div>
        <div class="radio-option"><input type="radio" name="q21" value="B" id="q21b"><label for="q21b"><b>B</b> are fascinating curved shapes.</label></div>
        <div class="radio-option"><input type="radio" name="q21" value="C" id="q21c"><label for="q21c"><b>C</b> have interesting stories behind them.</label></div>
        
        <p><b>22.</b> According to Amy, why are so few genuine old tikis found on archaeological dig sites?</p>
        <div class="radio-option"><input type="radio" name="q22" value="A" id="q22a"><label for="q22a"><b>A</b> Not many people know about them.</label></div>
        <div class="radio-option"><input type="radio" name="q22" value="B" id="q22b"><label for="q22b"><b>B</b> They tend to be stolen by treasure hunters.</label></div>
        <div class="radio-option"><input type="radio" name="q22" value="C" id="q22c"><label for="q22c"><b>C</b> The majority become inherited items.</label></div>
        
        <p><b>23.</b> The Maori people considered tikis to be</p>

    function formatTime(seconds) { 
        if(isNaN(seconds)) return '00:00'; 
        let m = Math.floor(seconds/60), s = Math.floor(seconds%60); 
        return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; 
    }
    function escapeHtml(s) { return s ? s.replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])) : ''; }
    
    function getAnswerText(qNum, value) {
        const answerMap = {

            26: { C: 'C - Stone scoring tool' },
            27: { A: 'A - Sandstone block' },
            28: { D: 'D - Bone point' },
            29: { E: 'E - Stick drill' },
            30: { B: 'B - Plant glue' }
        };
        return answerMap[qNum]?.[value] || value;
    }

    function initFull() {
        function showToast(msg) {
            let t = document.getElementById('toast');
            if(t) { t.textContent = msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1500); }
        }
        function updateTimerUI() {
            let timerSpan = document.getElementById('timer');
            if(timerSpan) timerSpan.textContent = formatTime(timerSeconds);
        }
        function startTimer() {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(()=>{ timerSeconds++; updateTimerUI(); },1000);
        }
        function stopTimer() {
            if(timerInterval) clearInterval(timerInterval); timerInterval = null;
        }
        
        function saveToLocal() {
            let notesHTML = document.getElementById('notes-list')?.innerHTML || '';
            localStorage.setItem('reborn_maori_carving', JSON.stringify({
                userAnswers, timerSeconds, isFinished, notesHTML
            }));
        }
        
        function loadFromLocal() {
            let raw = localStorage.getItem('reborn_maori_carving');
            if(raw) {
                let d = JSON.parse(raw);
                userAnswers = d.userAnswers || {};
                timerSeconds = d.timerSeconds || 0;
                isFinished = d.isFinished || false;
                if(d.notesHTML && document.getElementById('notes-list')) {
                    document.getElementById('notes-list').innerHTML = d.notesHTML;
                }
                updateTimerUI();
                if(isFinished) { finishTest(); }
                renderQuestions();
            } else {
                renderQuestions();
            }
        }
        
        function renderQuestions() {
            let panel = document.getElementById('questionsPanel');
            if(panel) panel.innerHTML = EXAM_QUESTIONS_HTML;
            attachRadioEvents();
            attachDragDropEvents();
            buildNav();
            restoreAnswers();
        }
        
        function attachRadioEvents() {
            document.querySelectorAll('input[type="radio"]').forEach(r => {
                r.addEventListener('change', (e) => {
                    if(!isFinished) {
                        userAnswers[e.target.name] = e.target.value;
                        updateNav();
                        saveToLocal();
                    }
                });
            });
        }
        
        function restoreAnswers() {
            for(let i=21;i<=25;i++) {
                if(userAnswers['q'+i]) {
                    let r = document.querySelector(`input[name="q${i}"][value="${userAnswers['q'+i]}"]`);
                    if(r) r.checked = true;
                }
            }
            for(let i=26;i<=30;i++) {
                if(userAnswers['q'+i]) {
                    let slot = document.querySelector(`.match-slot[data-q="${i}"]`);
                    let opt = document.querySelector(`.drag-option[data-value="${userAnswers['q'+i]}"]`);
                    if(slot && opt && !slot.classList.contains('filled')) {
                        let tag = document.createElement('span');
                        tag.className = 'tag';
                        tag.draggable = true;
                        tag.dataset.value = userAnswers['q'+i];
                        tag.textContent = opt.textContent;
                        slot.innerHTML = '';
                        slot.appendChild(tag);
                        slot.classList.add('filled');
                        opt.classList.add('hidden-in-pool');
                        attachTagDrag(tag);
                    }
                }
            }
        }
        
        let draggedItem = null;
        function attachDragDropEvents() {
            let dragOptions = document.querySelectorAll('.drag-option');
            let slots = document.querySelectorAll('.match-slot');
            let pool = document.querySelector('.drag-pool');
            
            dragOptions.forEach(opt => {
                opt.draggable = true;
                opt.ondragstart = e => {
                    draggedItem = opt;
                    e.dataTransfer.setData('text/plain', opt.dataset.value);
                };
            });
            
            slots.forEach(slot => {
                slot.ondragover = e => e.preventDefault();
                slot.ondrop = e => {
                    e.preventDefault();
                    let val = e.dataTransfer.getData('text/plain');
                    let source = document.querySelector(`.drag-option[data-value="${val}"]`);
                    if(!source) return;
                    
                    let existingTag = slot.querySelector('.tag');
                    if(existingTag) {
                        let oldVal = existingTag.dataset.value;
                        let oldOpt = document.querySelector(`.drag-option[data-value="${oldVal}"]`);
                        if(oldOpt) oldOpt.classList.remove('hidden-in-pool');
                        existingTag.remove();
                    }
                    
                    let tag = document.createElement('span');
                    tag.className = 'tag';
                    tag.draggable = true;
                    tag.dataset.value = val;
                    tag.textContent = source.textContent;
                    slot.innerHTML = '';
                    slot.appendChild(tag);
                    slot.classList.add('filled');
                    source.classList.add('hidden-in-pool');
                    attachTagDrag(tag);
                    
                    let qNum = slot.dataset.q;
                    userAnswers['q'+qNum] = val;
                    updateNav();
                    saveToLocal();
                };
            });
            
            if(pool) {
                pool.ondragover = e => e.preventDefault();
                pool.ondrop = e => {
                    if(!draggedItem?.closest('.tag')) return;
                    let tag = draggedItem.closest('.tag');
                    let slot = tag.closest('.match-slot');
                    if(!slot) return;
                    
                    let val = tag.dataset.value;
                    let opt = document.querySelector(`.drag-option[data-value="${val}"]`);
                    if(opt) opt.classList.remove('hidden-in-pool');
                    tag.remove();
                    slot.classList.remove('filled');
                    slot.innerHTML = '';
                    
                    let qNum = slot.dataset.q;
                    delete userAnswers['q'+qNum];
                    updateNav();
                    saveToLocal();
                };
            }
        }
        
        function attachTagDrag(tag) {
            tag.ondragstart = e => {
                draggedItem = tag;
                e.dataTransfer.setData('text/plain', tag.dataset.value);
            };
        }
        
        function buildNav() {
            let nav = document.getElementById('qNavContainer');
            if(!nav) return;
            nav.innerHTML = '';
            Q_LIST.forEach(num => {
                let div = document.createElement('div');
                div.className = 'q-nav-item';
                div.textContent = num;
                div.onclick = () => {
                    let target = parseInt(num) <=25
                        ? document.querySelector(`input[name="q${num}"]`)
                        : document.querySelector(`.match-slot[data-q="${num}"]`);
                    if(target) target.scrollIntoView({ behavior:'smooth', block:'center' });
                };
                nav.appendChild(div);
            });
            updateNav();
        }
        
        function updateNav() {
            let items = document.querySelectorAll('.q-nav-item');
            Q_LIST.forEach((num, idx) => {
                let item = items[idx];
                if(!item) return;
                let answered = false;
                if(parseInt(num)<=25) {
                    answered = !!document.querySelector(`input[name="q${num}"]:checked`);
                } else {
                    let slot = document.querySelector(`.match-slot[data-q="${num}"]`);
                    answered = slot?.classList.contains('filled');
                }
                item.classList.toggle('answered', answered);
                
                if(isFinished) {
                    let correct = false;
                    if(parseInt(num)<=25) {
                        correct = userAnswers['q'+num] === ANSWER_KEY.single['q'+num];
                    } else {
                        correct = userAnswers['q'+num] === ANSWER_KEY.matching['q'+num];
                    }
                    item.className = 'q-nav-item ' + (correct ? 'correct' : 'incorrect');
                }
            });
        }
        
        function finishTest() {
            if(isFinished) return;
            isFinished = true;
            stopTimer();
            
            document.getElementById('finishBtn').disabled = true;
            document.getElementById('earlySubmitBtn').disabled = true;
            
            for(let i=21;i<=25;i++) {
                let correct = ANSWER_KEY.single['q'+i];
                let user = userAnswers['q'+i];
                document.querySelectorAll(`input[name="q${i}"]`).forEach(r => {
                    let label = r.closest('.radio-option');
                    if(r.value === correct) {
                        label.style.background = 'var(--correct-bg)';
                        label.style.borderRadius = '8px';
                        label.style.padding = '4px 8px';
                    }
                    if(user && r.value === user && user !== correct) {
                        label.style.background = 'var(--incorrect-bg)';
                        label.style.borderRadius = '8px';
                        label.style.padding = '4px 8px';
                    }
                });
            }
            
            for(let i=26;i<=30;i++) {
                let slot = document.querySelector(`.match-slot[data-q="${i}"]`);
                let tag = slot?.querySelector('.tag');
                let user = tag?.dataset.value;
                let correct = ANSWER_KEY.matching['q'+i];
                if(user === correct) {
                    slot.style.borderColor = '#4ade80';
                    slot.style.backgroundColor = 'var(--correct-bg)';
                } else {
                    slot.style.borderColor = '#f87171';
                    slot.style.backgroundColor = 'var(--incorrect-bg)';
                }
            }
            
            let table = `<h4 style="margin:20px 0; color:var(--primary-green)">📊 答案解析</h4>
            <table class="results-table">
            <tr><th>题目</th><th>你的答案</th><th>正确答案</th><th>结果</th></tr>`;
            
            for(let i=21;i<=30;i++) {
                let user = '', correct = '', res = '';
                if(i<=25) {
                    user = getAnswerText(i, userAnswers['q'+i] || '');
                    correct = getAnswerText(i, ANSWER_KEY.single['q'+i]);
                    res = userAnswers['q'+i] === ANSWER_KEY.single['q'+i];
                } else {
                    user = getAnswerText(i, userAnswers['q'+i] || '');
                    correct = getAnswerText(i, ANSWER_KEY.matching['q'+i]);
                    res = userAnswers['q'+i] === ANSWER_KEY.matching['q'+i];
                }
                table += `<tr>
                <td>${i}</td>
                <td>${escapeHtml(user || '未作答')}</td>
                <td>${escapeHtml(correct)}</td>
                <td class="${res?'result-correct':'result-incorrect'}">${res?'✔ 正确':'✖ 错误'}</td>
                </tr>`;
            }
            table += `</table>`;
            document.querySelector('.results-in-page').innerHTML = table;
            updateNav();
            showToast('已提交，查看解析');
        }
        
        function clearAll() {
            if(confirm('确定清空所有进度？')) {
                localStorage.removeItem('reborn_maori_carving');
                location.reload();
            }
        }
        
        function renderAudioManager() {
            let sec = document.getElementById('audioSection');
            if(!sec) return;
            sec.innerHTML = `
            <div class="audio-header"><span class="badge">🎧 音频播放器</span></div>
            <div class="import-bar">
                <button class="btn-primary" id="importAudioBtn">📁 导入音频</button>

            document.getElementById('clearAudioBtn').onclick = () => {

        function setupAudioControls() {
            let playBtn = document.getElementById('playPauseBtn');
            let progWrap = document.getElementById('progressWrap');
            let progBar = document.getElementById('progressBar');
            let timeSpan = document.getElementById('timeDisplay');
            let speedSelect = document.getElementById('speedSelect');
            let confirmBtn = document.getElementById('confirmStartBtn');
            
            function update() {
                if(!audioElement.duration) return;
                progBar.style.width = (audioElement.currentTime/audioElement.duration*100)+'%';
                timeSpan.textContent = `${formatTime(audioElement.currentTime)} / ${formatTime(audioElement.duration)}`;
            }
            
            audioElement.ontimeupdate = update;
            audioElement.onloadedmetadata = update;
            
            speedSelect.onchange = () => {
                if(!firstPlayActive || examCompleted) {
                    audioElement.playbackRate = +speedSelect.value;
                }
            };
            
            let scrub = false;
            progWrap.onmousedown = e => { scrub = true; set(e); };
            window.onmousemove = e => scrub && set(e);
            window.onmouseup = () => scrub = false;
            
            function set(e) {
                if(firstPlayActive && !examCompleted) return;
                let r = progWrap.getBoundingClientRect();
                let p = Math.min(1, Math.max(0, (e.x - r.x)/r.width));
                audioElement.currentTime = p * audioElement.duration;
                update();
            }
            
            playBtn.onclick = () => {
                if(firstPlayActive && !examCompleted) {
                    showToast('考试中不可暂停/快进');
                    return;
                }
                if(audioElement.paused) {
                    audioElement.play();
                    if(!examStarted) {
                        examStarted = firstPlayActive = true;
                        document.getElementById('finishBtn').disabled = false;
                        document.getElementById('earlySubmitBtn').disabled = false;
                        startTimer();
                        audioElement.onended = () => {
                            examCompleted = true;
                            examStarted = firstPlayActive = false;
                            showToast('音频播放完毕');
                        };
                    }
                } else {
                    audioElement.pause();
                }
                playBtn.textContent = audioElement.paused ? '▶' : '❚❚';
            };
            
            confirmBtn.onclick = () => {
                if(!audioElement) return showToast('请先导入音频');
                if(examStarted) return showToast('考试已开始');
                examStarted = firstPlayActive = true;
                document.getElementById('finishBtn').disabled = false;
                document.getElementById('earlySubmitBtn').disabled = false;
                startTimer();
                audioElement.play();
            };
        }
        
        function initNotes() {
            let bar = document.getElementById('selbar');
            let range = null;
            
            document.addEventListener('mouseup', () => {
                let sel = window.getSelection();
                if(!sel.isCollapsed && sel.toString().trim()) {
                    range = sel.getRangeAt(0);
                    let r = range.getBoundingClientRect();
                    bar.hidden = false;
                    bar.style.left = window.scrollX + r.left + r.width/2 - 80 + 'px';
                    bar.style.top = window.scrollY + r.top - 45 + 'px';
                } else {
                    bar.hidden = true;
                }
            });
            
            bar.onclick = e => {
                let a = e.target.dataset.act;
                if(!a || !range) return;
                if(a === 'hl') {
                    let span = document.createElement('span');
                    span.className = 'hl';
                    try { range.surroundContents(span); } catch(_){}
                }
                if(a === 'note') {
                    let span = document.createElement('span');
                    span.className = 'hl-blue';
                    let id = 'n'+Date.now();
                    span.dataset.hid = id;
                    try {
                        range.surroundContents(span);
                        let card = document.createElement('div');
                        card.className = 'note-card';
                        card.dataset.hid = id;
                        card.innerHTML = `
                        <div class="note-quote">${escapeHtml(span.textContent)}</div>
                        <textarea placeholder="写下笔记..."></textarea>
                        <div class="note-actions">
                            <button data-del="${id}">删除</button>
                        </div>`;
                        card.querySelector('button').onclick = () => {
                            let t = document.querySelector(`[data-hid="${id}"]`);
                            if(t) t.replaceWith(document.createTextNode(t.textContent));
                            card.remove();
                            saveToLocal();
                        };
                        card.querySelector('textarea').oninput = saveToLocal;
                        document.getElementById('notes-list').prepend(card);
                        document.body.classList.add('notes-open');
                        saveToLocal();
                    } catch(_){}
                }
                bar.hidden = true;
                window.getSelection().removeAllRanges();
            };
            
            document.getElementById('toggle-notes-btn').onclick = () => {
                document.body.classList.toggle('notes-open');
            };
            document.getElementById('notes-close').onclick = () => {
                document.body.classList.remove('notes-open');
            };
        }
        
        document.getElementById('finishBtn').onclick = () => {
            if(examCompleted) finishTest();
            else showToast('请等待音频结束或使用提前交卷');
        };
        document.getElementById('earlySubmitBtn').onclick = () => {
            if(examStarted && confirm('确定提前交卷？')) {
                audioElement?.pause();
                examCompleted = true;
                finishTest();
            }
        };
        document.getElementById('saveBtn').onclick = () => { saveToLocal(); showToast('已保存进度'); };
        document.getElementById('clearBtn').onclick = clearAll;
        
        renderAudioManager();
        initNotes();
        loadFromLocal();
    }

    document.getElementById('confirmPwdBtn').addEventListener('click', handlePassword);
    document.getElementById('passwordInput').addEventListener('keypress', e => {
        if(e.key === 'Enter') handlePassword();
    });
    
    updateDate();
    setupTheme();
    setInterval(updateDate, 60000);
</script>

<script>
// 优化版自动音频加载
let audioLoadAttempts = 0;
const maxAttempts = 5;

function autoLoadAudio() {
    if (audioLoadAttempts >= maxAttempts) return;
    audioLoadAttempts++;

    const fileInput = document.querySelector('input[type="file"][accept="audio/*"]');
    if (!fileInput || fileInput.files.length > 0) return;

    const page = location.pathname.split('/').pop().split('.')[0];
    const audioFile = page + '.mp3';

    fetch(audioFile)
        .then(res => {
            if (!res.ok) throw new Error('音频不存在');
            return res.blob();
        })
        .then(blob => {
            const file = new File([blob], audioFile, { type: 'audio/mpeg' });
            const dt = new DataTransfer();
            dt.items.add(file);
            fileInput.files = dt.files;
            fileInput.dispatchEvent(new Event('change', { bubbles: true }));
            console.log('✅ 音频自动加载成功');
        })
        .catch(() => {
            setTimeout(autoLoadAudio, 1000);
        });
}

window.addEventListener('load', () => {
    setTimeout(autoLoadAudio, 800);
});
</script>
